<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dự Đoán World Cup 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; }
        .fade-in { animation: fadeIn 0.8s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="app" class="max-w-2xl mx-auto p-4">
        <header class="flex justify-between items-center py-6 border-b border-slate-700 mb-6">
            <h1 class="text-2xl font-bold text-yellow-500 animate-pulse">WC 2026 Predict</h1>
            <div id="auth-section">
                <button onclick="toggleModal()" class="bg-blue-600 px-4 py-2 rounded-lg font-bold hover:bg-blue-500 transition-all hover:scale-105">Đăng nhập</button>
            </div>
        </header>

        <!-- Trận đấu đang diễn ra -->
        <div id="live-matches" class="space-y-4 mb-8">
            <h2 class="text-xl font-semibold mb-4 text-blue-400">Trận đấu đang diễn ra</h2>
            <div id="loading" class="text-slate-400">Đang tải lịch thi đấu...</div>
        </div>

        <!-- Trận đấu đã qua -->
        <div id="past-matches" class="space-y-4">
            <h2 class="text-xl font-semibold mb-4 text-slate-500">Kết quả toàn bộ trận đã qua</h2>
        </div>
    </div>

    <div id="login-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
        <div class="bg-slate-900 p-8 rounded-2xl w-full max-w-sm border border-slate-700 animate-in fade-in zoom-in duration-300">
            <h2 class="text-xl font-bold mb-4">Đăng nhập</h2>
            <input type="email" placeholder="Email" class="w-full bg-slate-800 p-3 rounded mb-4 border border-slate-600 text-white focus:ring-2 focus:ring-blue-500 outline-none">
            <button onclick="toggleModal()" class="w-full bg-blue-600 py-3 rounded font-bold text-white hover:bg-blue-500 transition">Xác nhận</button>
        </div>
    </div>

    <script>
        const liveMatches = [
            { id: 1, home: "Panama", away: "Anh", time: "17:00", status: "live" },
            { id: 2, home: "Colombia", away: "Bồ Đào Nha", time: "20:00", status: "live" }
        ];

        const pastMatches = [
            { id: 3, home: "Argentina", away: "Jordan", score: "3 - 0" },
            { id: 4, home: "Đức", away: "Ecuador", score: "1 - 2" },
            { id: 5, home: "Brazil", away: "Senegal", score: "2 - 0" },
            { id: 6, home: "Pháp", away: "Canada", score: "1 - 1" },
            { id: 7, home: "Tây Ban Nha", away: "Nhật Bản", score: "2 - 1" }
        ];

        function loadMatches() {
            const liveContainer = document.getElementById('live-matches');
            const pastContainer = document.getElementById('past-matches');
            document.getElementById('loading').style.display = 'none';

            // Load live
            liveMatches.forEach(match => {
                const div = document.createElement('div');
                div.className = "bg-slate-800 p-4 rounded-xl border border-slate-700 flex flex-col gap-3 fade-in hover:border-blue-500 transition-all";
                div.innerHTML = `
                    <div class="flex justify-between items-center">
                        <span class="font-bold text-lg">${match.home} vs ${match.away}</span>
                        <span class="text-xs bg-red-900 text-red-200 px-2 py-1 rounded animate-pulse">LIVE</span>
                    </div>
                    <div class="flex gap-2">
                        <input type="number" placeholder="Nhà" class="w-1/2 bg-slate-900 p-2 rounded border border-slate-600 text-white outline-none">
                        <input type="number" placeholder="Khách" class="w-1/2 bg-slate-900 p-2 rounded border border-slate-600 text-white outline-none">
                        <button onclick="savePrediction('${match.home}', '${match.away}')" class="bg-green-600 px-4 rounded hover:bg-green-500 font-bold">Lưu</button>
                    </div>
                `;
                liveContainer.appendChild(div);
            });

            // Load past
            pastMatches.forEach(match => {
                const div = document.createElement('div');
                div.className = "bg-slate-900/50 p-4 rounded-xl border border-slate-800 flex justify-between items-center hover:bg-slate-800 transition-colors";
                div.innerHTML = `
                    <span class="font-bold text-slate-300">${match.home} vs ${match.away}</span>
                    <span class="font-bold text-yellow-500 bg-slate-950 px-3 py-1 rounded border border-slate-700">${match.score}</span>
                `;
                pastContainer.appendChild(div);
            });
        }

        function toggleModal() {
            document.getElementById('login-modal').classList.toggle('hidden');
        }

        function savePrediction(home, away) {
            alert(`Đã lưu dự đoán cho trận: ${home} vs ${away}!`);
        }

        window.onload = loadMatches;
    </script>
</body>
</html>
